name: tencentdb-offload
version: 0.2.0
description: "TencentDB offload as Hermes ContextEngine — multi-layer context compression via offload V2 API (L1 tool-pair summary, L2 Mermaid canvas, L3 compaction). Talk to :8420 HTTP API only; no TencentDB code dependency."
author: "ClawCompany"
provides_context_engine: tencentdb-offload
requires_gateway: true
gateway_default_port: 8420
config_env:
  - TENCENTDB_OFFLOAD_GATEWAY_URL
  - TENCENTDB_OFFLOAD_API_KEY
  - TENCENTDB_OFFLOAD_INSTANCE_ID
  - TENCENTDB_OFFLOAD_COMPACT_RATIO
  - TENCENTDB_OFFLOAD_TIMEOUT_MS
  - TENCENTDB_OFFLOAD_INGEST_TIMEOUT_MS
  - TENCENTDB_OFFLOAD_THRESHOLD
  - TENCENTDB_OFFLOAD_ENABLED
